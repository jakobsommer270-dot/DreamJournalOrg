<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucid Dreamer App</title>
    <style>
        :root {
            --bg-color: #0d0e15;
            --card-bg: #161925;
            --accent-color: #705df2;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --border-color: #23283d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        /* Navigation Tabs */
        .tabs {
            display: flex;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s, border-bottom 0.2s;
        }

        .tab-btn.active {
            color: var(--accent-color);
            border-bottom: 3px solid var(--accent-color);
            margin-bottom: -2px;
        }

        /* Inhalt-Bereiche */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Formulare und Karten */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 0;
            font-size: 20px;
            color: #fff;
        }

        textarea, input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            margin-bottom: 12px;
            resize: vertical;
        }

        button.btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        button.btn:hover {
            opacity: 0.9;
        }

        /* Checkliste */
        .todo-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .todo-item:last-child {
            border-bottom: none;
        }

        .todo-item input[type="checkbox"] {
            margin-right: 15px;
            width: 18px;
            height: 18px;
            accent-color: var(--accent-color);
            cursor: pointer;
        }

        /* Traumliste & Muster */
        .dream-entry {
            border-left: 3px solid var(--accent-color);
            padding-left: 15px;
            margin-bottom: 15px;
        }

        .dream-date {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .dream-pattern {
            display: inline-block;
            background-color: rgba(112, 93, 242, 0.15);
            color: #a79eff;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            margin-top: 5px;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Navigation -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab-journal')">Tagebuch</button>
            <button class="tab-btn" onclick="switchTab('tab-checks')">Abhaken</button>
            <button class="tab-btn" onclick="switchTab('tab-settings')">API-Key</button>
        </div>

        <!-- TAB 1: Traumtagebuch -->
        <div id="tab-journal" class="tab-content active">
            <div class="card">
                <h2>Neuen Traum eintragen</h2>
                <textarea id="dream-text" rows="4" placeholder="Beschreibe deinen Traum so detailliert wie möglich..."></textarea>
                <button class="btn" onclick="saveDream()">Traum speichern & analysieren</button>
            </div>

            <div class="card">
                <h2>Erkannte Traummuster</h2>
                <div id="patterns-summary">Noch keine Muster erkannt.</div>
            </div>

            <div class="card">
                <h2>Deine Träume</h2>
                <div id="dreams-list">Keine Einträge vorhanden.</div>
            </div>
        </div>

        <!-- TAB 2: Checkliste -->
        <div id="tab-checks" class="tab-content">
            <div class="card">
                <h2>Tägliche Reality Checks</h2>
                <div class="todo-item">
                    <input type="checkbox" id="check-1" onchange="saveChecks()">
                    <label for="check-1">Auf die Uhr schauen (zweimal kurz hintereinander)</label>
                </div>
                <div class="todo-item">
                    <input type="checkbox" id="check-2" onchange="saveChecks()">
                    <label for="check-2">Durch die geschlossene Nase atmen versuchen</label>
                </div>
                <div class="todo-item">
                    <input type="checkbox" id="check-3" onchange="saveChecks()">
                    <label for="check-3">Text oder Schilder zweimal lesen</label>
                </div>
                <div class="todo-item">
                    <input type="checkbox" id="check-4" onchange="saveChecks()">
                    <label for="check-4">Umgebung hinterfragen ("Träume ich gerade?")</label>
                </div>
            </div>
        </div>

        <!-- TAB 3: Einstellungen (API-Key) -->
        <div id="tab-settings" class="tab-content">
            <div class="card">
                <h2>Gemini API-Schlüssel</h2>
                <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 15px;">
                    Der Schlüssel wird ausschließlich lokal in deinem Browser (LocalStorage) gespeichert.
                </p>
                <input type="text" id="api-key-input" placeholder="AIzaSy...">
                <button class="btn" onclick="saveApiKey()">Schlüssel speichern</button>
            </div>
        </div>
    </div>

    <script>
        // Tab-Wechsel-Logik
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // API-Key Funktionen
        function saveApiKey() {
            const key = document.getElementById('api-key-input').value.trim();
            localStorage.setItem('gemini_api_key', key);
            alert('API-Schlüssel wurde lokal gespeichert.');
        }

        function loadApiKey() {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) {
                document.getElementById('api-key-input').value = savedKey;
            }
        }

        // Checkboxen Funktionen
        function saveChecks() {
            const checks = {
                check1: document.getElementById('check-1').checked,
                check2: document.getElementById('check-2').checked,
                check3: document.getElementById('check-3').checked,
                check4: document.getElementById('check-4').checked
            };
            localStorage.setItem('dream_checks', JSON.stringify(checks));
        }

        function loadChecks() {
            const savedChecks = JSON.parse(localStorage.getItem('dream_checks'));
            if (savedChecks) {
                document.getElementById('check-1').checked = savedChecks.check1 || false;
                document.getElementById('check-2').checked = savedChecks.check2 || false;
                document.getElementById('check-3').checked = savedChecks.check3 || false;
                document.getElementById('check-4').checked = savedChecks.check4 || false;
            }
        }

        // Traum-Funktionen (Speichern & API-Aufruf)
        async function saveDream() {
            const textEl = document.getElementById('dream-text');
            const text = textEl.value.trim();
            if (!text) return;

            const apiKey = localStorage.getItem('gemini_api_key');
            let patterns = [];

            if (apiKey) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{
                                    text: `Analysiere folgenden Traumtext. Extrahiere die 2 bis 4 wichtigsten wiederkehrenden Kernelemente (Traumzeichen, z.B. Orte, Personen, Objekte, Gefühle) als kurze Stichpunkte. Antworte ausschließlich als kommagetrennte Liste, ohne Nummerierung, ohne Einleitung. Beispiel-Antwort: Wasser, Fliegen, Unbekannte Person. Traumtext: ${text}`
                                }]
                            }]
                        })
                    });
                    
                    const data = await response.json();
                    if (data.candidates && data.candidates[0].content.parts[0].text) {
                        const aiResponse = data.candidates[0].content.parts[0].text;
                        patterns = aiResponse.split(',').map(p => p.trim()).filter(p => p.length > 0);
                    }
                } catch (error) {
                    console.error("API Fehler:", error);
                }
            }

            const dreams = JSON.parse(localStorage.getItem('user_dreams') || '[]');
            const newDream = {
                id: Date.now(),
                date: new Date().toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }),
                text: text,
                patterns: patterns
            };

            dreams.unshift(newDream);
            localStorage.setItem('user_dreams', JSON.stringify(dreams));
            
            textEl.value = '';
            displayDreams();
            updatePatternsSummary();
        }

        function displayDreams() {
            const dreams = JSON.parse(localStorage.getItem('user_dreams') || '[]');
            const listEl = document.getElementById('dreams-list');
            
            if (dreams.length === 0) {
                listEl.innerHTML = 'Keine Einträge vorhanden.';
                return;
            }

            listEl.innerHTML = dreams.map(dream => `
                <div class="dream-entry">
                    <div class="dream-date">${dream.date}</div>
                    <div>${dream.text}</div>
                    <div>${dream.patterns.map(p => `<span class="dream-pattern">${p}</span>`).join('')}</div>
                </div>
            `).join('');
        }

        function updatePatternsSummary() {
            const dreams = JSON.parse(localStorage.getItem('user_dreams') || '[]');
            const summaryEl = document.getElementById('patterns-summary');
            
            let allPatterns = {};
            dreams.forEach(dream => {
                dream.patterns.forEach(p => {
                    const cleanPattern = p.toLowerCase();
                    allPatterns[cleanPattern] = (allPatterns[cleanPattern] || 0) + 1;
                });
            });

            const sorted = Object.entries(allPatterns).sort((a, b) => b[1] - a[1]);
            
            if (sorted.length === 0) {
                summaryEl.innerHTML = 'Noch keine Muster erkannt.';
                return;
            }

            summaryEl.innerHTML = sorted.map(([pattern, count]) => `
                <span class="dream-pattern">${pattern} (${count}x)</span>
            `).join('');
        }

        // App-Start Initialisierung
        loadApiKey();
        loadChecks();
        displayDreams();
        updatePatternsSummary();
    </script>
</body>
</html>
